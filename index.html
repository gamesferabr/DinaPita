<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dina Pita</title>
    <meta
      name="description"
      content="Escritório de arquitetura — substitua por texto do cliente."
    />
    <link rel="icon" href="/assets/logo-dina-preto.png" type="image/png" />
    <script type="text/javascript">
      (function (locationRef) {
        if (locationRef.search[1] === "/") {
          var decoded = locationRef.search
            .slice(1)
            .split("&")
            .map(function (segment) {
              return segment.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            locationRef.pathname.slice(0, -1) + decoded + locationRef.hash
          );
        }
      })(window.location);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
